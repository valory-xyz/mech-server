; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Tomte hardcodes isort `known_first_party = autonomy`. Combined with
; isort's src_paths auto-detection (which adds `mtd` to FIRSTPARTY when
; running from repo root), `from mtd.*` and `from autonomy.*` end up in
; separate FIRSTPARTY-internal blocks while pylint classifies `autonomy`
; as third-party. The two tools cannot agree no matter how the source is
; ordered. isort owns the final layout; silence pylint's redundant view.
extra_pylint_disables = wrong-import-order
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are range-form overrides for runtime deps where the package YAML uses
; a range expression — `aea-helpers check-dependencies` does
; string-strict matching so the form must agree on both sides. Plus
; lint-only werkzeug/attrs not in pyproject.
extra_deps =
    protobuf<7,>=5
    openapi-core<0.23,>=0.22
    openapi-spec-validator<0.8.0,>=0.7.0
    pebble>=5.1,<5.2
    prometheus_client>=0.23.1,<0.24
    web3<8,>=7.0.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    werkzeug>=3.1,<4
    attrs>=25,<26

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not
; lint-clean — these come from mech upstream).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.*]
ignore_errors = True

; First-party CLI code imports several third-party libs that ship without
; type stubs (python-dotenv, safe-eth-py, olas-operate-middleware). Silence
; the missing-import noise so real type errors surface.
[mypy-dotenv]
ignore_missing_imports = True

[mypy-safe_eth.*]
ignore_missing_imports = True

[mypy-operate.*]
ignore_missing_imports = True


[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.19
; Valory-published wheels with UNKNOWN license metadata; all Apache-2.0.
; semantic_version (used by liccheck) chokes on PEP 440 pre-releases like
; `0.1.0rc4`, so accept any version of these Valory-owned packages.
clea: *
olas-operate-middleware: *
open-aea-flashbots: *
; pyinstaller / pyinstaller-hooks-contrib are GPLv2 build tools (not
; distributed with the software).
pyinstaller: *
pyinstaller-hooks-contrib: *
; safe-pysha3 is CC0 + PSF; keccak hashing pulled in via safe-eth-py.
safe-pysha3: *
